<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — Olive Designs</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .notif-item { background: var(--white); border-radius: 12px; border: 1px solid var(--border); padding: 16px 20px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 14px; cursor: pointer; transition: all 0.2s; }
    .notif-item:hover { box-shadow: 0 4px 16px var(--shadow); transform: translateY(-1px); }
    .notif-item.unread { border-left: 3px solid var(--olive); }
    .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--olive); margin-top: 6px; flex-shrink: 0; }
    .notif-dot.read { background: var(--border); }
    .notif-message { font-size: 0.9rem; color: var(--text); margin-bottom: 4px; }
    .notif-time { font-size: 0.78rem; color: var(--muted); }
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="brand-wrap">
      <a href="/" class="brand" style="font-size:1.3rem;text-decoration:none;">Olive Designs</a>
    </div>
    <ul class="sidebar-nav" id="sidebarNav"></ul>
    <div class="sidebar-bottom">
      <ul class="sidebar-nav" style="padding:0;">
        <li><a href="#"><span id="nameDisplay">Account</span></a></li>
        <li><a href="#" onclick="logout(event)">Sign Out</a></li>
      </ul>
    </div>
  </aside>
  <main class="dashboard-main">
    <div class="page-header">
      <h1>Notifications</h1>
      <p>Stay up to date on your projects</p>
    </div>
    <div id="notifList"></div>
  </main>
</div>
<script>
  async function logout(e) { e.preventDefault(); await fetch('/logout', { method: 'POST' }); window.location.href = '/'; }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return mins + 'm ago';
    const hours = Math.floor(mins / 60);
    if (hours < 24) return hours + 'h ago';
    return Math.floor(hours / 24) + 'd ago';
  }

  async function init() {
    const meRes = await fetch('/api/me');
    const me = await meRes.json();
    if (!me.loggedIn) return window.location.href = '/login';
    document.getElementById('nameDisplay').textContent = me.fullName.split(' ')[0];

    const nav = document.getElementById('sidebarNav');
    if (me.role === 'customer') {
      nav.innerHTML = `
        <li><a href="/dashboard/customer">My Projects</a></li>
        <li><a href="/project/new">New Project</a></li>
        <li><a href="/designers">Browse Designers</a></li>
        <li><a href="/notifications" class="active">Notifications</a></li>`;
    } else {
      nav.innerHTML = `
        <li><a href="/dashboard/designer">Dashboard</a></li>
        <li><a href="/notifications" class="active">Notifications</a></li>`;
    }

    const res = await fetch('/api/notifications');
    const notifications = await res.json();
    const list = document.getElementById('notifList');

    if (!notifications.length) {
      list.innerHTML = `<div style="text-align:center;padding:80px 40px;"><h3 style="font-size:1.1rem;margin-bottom:8px;color:var(--text);">No notifications yet</h3><p style="color:var(--muted);font-weight:300;">You'll be notified when something happens on your projects.</p></div>`;
      return;
    }

    list.innerHTML = notifications.map(n => `
      <div class="notif-item ${!n.read_at ? 'unread' : ''}" onclick="${n.project_id ? `window.location.href='/project/${n.project_id}'` : ''}">
        <div class="notif-dot ${n.read_at ? 'read' : ''}"></div>
        <div>
          <div class="notif-message">${n.message}</div>
          <div class="notif-time">${timeAgo(n.created_at)}</div>
        </div>
      </div>
    `).join('');
  }

  init();
</script>
</body>
</html>
