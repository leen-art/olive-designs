<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Designer Dashboard — Olive Designs</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .project-card { background: var(--white); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; transition: all 0.2s; cursor: pointer; }
    .project-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--shadow-md); }
    .project-card-img { height: 160px; background: linear-gradient(135deg, #c8d4ac, #8a9e5f); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .project-card-img img { width: 100%; height: 100%; object-fit: cover; }
    .project-card-body { padding: 20px; }
    .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .status-submitted { background: #f0f4eb; color: #4f5c35; }
    .status-assigned { background: #fdf6e3; color: #8a6914; }
    .status-in_progress { background: #e8f0fe; color: #1a56a0; }
    .status-review { background: #fdf0ef; color: #9c3a34; }
    .status-completed { background: #f0f4eb; color: #4f5c35; }
    .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 28px; }
    .tab { padding: 10px 20px; cursor: pointer; font-size: 0.9rem; font-weight: 500; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab.active { color: var(--olive); border-bottom-color: var(--olive); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="brand-wrap">
      <a href="/" class="brand" style="font-size:1.3rem;text-decoration:none;">Olive Designs</a>
    </div>
    <ul class="sidebar-nav">
      <li><a href="/dashboard/designer" class="active">Dashboard</a></li>
      <li><a href="/notifications">Notifications</a></li>
    </ul>
    <div class="sidebar-bottom">
      <ul class="sidebar-nav" style="padding:0;">
        <li><a href="#"><span id="nameDisplay">Account</span></a></li>
        <li><a href="#" onclick="logout(event)">Sign Out</a></li>
      </ul>
    </div>
  </aside>
  <main class="dashboard-main">
    <div class="page-header">
      <h1 id="pageTitle">Designer Dashboard</h1>
      <p id="pageSubtitle">Welcome back</p>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('available', event)">Available Projects</div>
      <div class="tab" onclick="switchTab('active', event)">My Active Projects</div>
    </div>
    <div class="tab-content active" id="tab-available">
      <div id="availableGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;"></div>
    </div>
    <div class="tab-content" id="tab-active">
      <div id="activeGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;"></div>
    </div>
  </main>
</div>
<script>
  async function logout(e) { e.preventDefault(); await fetch('/logout', { method: 'POST' }); window.location.href = '/'; }

  function switchTab(name, event) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  async function claimProject(id, e) {
    e.stopPropagation();
    const res = await fetch('/api/projects/' + id + '/claim', { method: 'POST' });
    const data = await res.json();
    if (data.success) { loadAll(); }
    else alert(data.error);
  }

  async function loadAll() {
    const meRes = await fetch('/api/me');
    const me = await meRes.json();
    if (!me.loggedIn) return window.location.href = '/login';
    document.getElementById('nameDisplay').textContent = me.fullName.split(' ')[0];
    document.getElementById('pageSubtitle').textContent = 'Welcome back, ' + me.fullName.split(' ')[0];

    const [availRes, activeRes] = await Promise.all([
      fetch('/api/available-projects'),
      fetch('/api/my-projects')
    ]);
    const available = await availRes.json();
    const active = await activeRes.json();

    const availGrid = document.getElementById('availableGrid');
    if (!available.length) {
      availGrid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 40px;"><h3 style="font-size:1.2rem;margin-bottom:8px;color:var(--text);">No projects available right now</h3><p style="color:var(--muted);font-weight:300;">Check back soon — new projects are posted regularly.</p></div>`;
    } else {
      availGrid.innerHTML = available.map(p => `
        <div class="project-card" onclick="window.location.href='/project/${p.id}'">
          <div class="project-card-img">${p.preview_image ? `<img src="${p.preview_image}">` : '<div style="width:100%;height:100%;background:linear-gradient(135deg,#c8d4ac,#8a9e5f);"></div>'}</div>
          <div class="project-card-body">
            <h3>${p.room_type}</h3>
            <div style="color:var(--muted);font-size:0.85rem;margin-bottom:12px;">${p.customer_name} · ${p.budget ? '$' + p.budget + ' budget' : 'No budget specified'}</div>
            <div style="font-size:0.82rem;color:var(--muted);margin-bottom:12px;">${p.style_preferences || 'No style specified'}</div>
            <button onclick="claimProject(${p.id}, event)" class="btn btn-primary" style="width:100%;padding:10px;">Claim Project</button>
          </div>
        </div>
      `).join('');
    }

    const activeGrid = document.getElementById('activeGrid');
    if (!active.length) {
      activeGrid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 40px;"><h3 style="margin-bottom:8px;">No active projects</h3><p style="color:var(--muted);font-weight:300;">Claim a project to get started.</p></div>`;
    } else {
      activeGrid.innerHTML = active.map(p => `
        <div class="project-card" onclick="window.location.href='/project/${p.id}'">
          <div class="project-card-img"><div style="width:100%;height:100%;background:linear-gradient(135deg,#c8d4ac,#8a9e5f);"></div></div>
          <div class="project-card-body">
            <h3>${p.room_type}</h3>
            <div style="margin-bottom:8px;"><span class="status-badge status-${p.status}">${p.status.replace('_',' ')}</span></div>
            <div style="font-size:0.82rem;color:var(--muted);">Customer: ${p.customer_name} ${p.budget ? '· $' + p.budget : ''}</div>
          </div>
        </div>
      `).join('');
    }
  }

  loadAll();
</script>
</body>
</html>
