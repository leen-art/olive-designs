<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Designer Dashboard — Olive</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #FAF7F4; color: #2A2520; display: flex; min-height: 100vh; }
    aside { width: 230px; background: #1C1C1C; display: flex; flex-direction: column; padding: 2.5rem 1.8rem; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; }
    .brand { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; color: white; text-decoration: none; letter-spacing: 0.1em; margin-bottom: 3rem; display: block; }
    .brand em { color: #C4A882; font-style: italic; }
    .sidebar-nav { list-style: none; }
    .sidebar-nav li a { display: block; padding: 0.55rem 0.8rem; color: #7A7168; text-decoration: none; font-size: 0.8rem; font-weight: 300; border-radius: 4px; transition: all 0.15s; letter-spacing: 0.04em; }
    .sidebar-nav li a:hover { color: #FAF7F4; }
    .sidebar-nav li a.active { color: white; }
    .sidebar-bottom { margin-top: auto; padding-top: 1.5rem; border-top: 1px solid #2A2A2A; }
    main { flex: 1; margin-left: 230px; padding: 4rem 5rem; }
    .top-bar { margin-bottom: 3.5rem; padding-bottom: 2rem; border-bottom: 1px solid #EDE8E0; display: flex; align-items: flex-end; justify-content: space-between; }
    .top-bar h1 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-weight: 300; color: #2A2520; }
    .top-bar h1 em { font-style: italic; color: #C4A882; }
    .top-bar p { font-size: 0.78rem; color: #A89880; margin-top: 0.4rem; font-weight: 300; text-transform: uppercase; letter-spacing: 0.06em; }
    .top-date { font-size: 0.75rem; color: #A89880; font-weight: 300; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
    .section-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.14em; color: #A89880; font-weight: 500; }
    .projects-list { display: flex; flex-direction: column; gap: 1px; background: #EDE8E0; margin-bottom: 3rem; }
    .project-row { background: #FAF7F4; padding: 1.5rem 2rem; display: flex; align-items: center; gap: 2rem; cursor: pointer; transition: background 0.15s; }
    .project-row:hover { background: white; }
    .project-img { width: 64px; height: 64px; background: #EDE8E0; flex-shrink: 0; overflow: hidden; }
    .project-img img { width: 100%; height: 100%; object-fit: cover; }
    .project-info { flex: 1; }
    .project-info h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 400; margin-bottom: 0.3rem; color: #2A2520; }
    .project-info p { font-size: 0.75rem; color: #A89880; font-weight: 300; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-submitted, .dot-assigned { background: #C4A882; }
    .dot-in_progress { background: #8EB4C4; }
    .dot-review { background: #C48E9B; }
    .dot-completed { background: #8EC49B; }
    .status-text { font-size: 0.68rem; color: #A89880; text-transform: uppercase; letter-spacing: 0.08em; }
    .project-arrow { color: #C4A882; font-size: 0.9rem; }
    .available-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; background: #EDE8E0; }
    .available-card { background: #FAF7F4; padding: 1.8rem; cursor: pointer; transition: background 0.15s; }
    .available-card:hover { background: white; }
    .available-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 400; margin-bottom: 0.4rem; color: #2A2520; }
    .available-card p { font-size: 0.76rem; color: #A89880; font-weight: 300; line-height: 1.6; margin-bottom: 1rem; }
    .card-meta { font-size: 0.68rem; color: #A89880; display: flex; gap: 1rem; margin-bottom: 1rem; }
    .claim-btn { background: #2A2520; color: white; border: none; padding: 0.6rem 1.4rem; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; }
    .claim-btn:hover { background: #C4A882; color: #2A2520; }
    .empty { padding: 4rem; text-align: center; background: #FAF7F4; }
    .empty h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; margin-bottom: 0.5rem; }
    .empty p { font-size: 0.8rem; color: #A89880; font-weight: 300; }
  </style>
</head>
<body>
<aside>
  <a href="/" class="brand">Olive<em>.</em></a>
  <ul class="sidebar-nav">
    <li><a href="/dashboard/designer" class="active">Overview</a></li>
    <li><a href="/notifications">Notifications</a></li>
  </ul>
  <div class="sidebar-bottom">
    <ul class="sidebar-nav" style="padding:0;">
      <li><a href="#"><span id="nameDisplay">Account</span></a></li>
      <li><a href="#" onclick="logout(event)">Sign Out</a></li>
    </ul>
  </div>
</aside>
<main>
  <div class="top-bar">
    <div>
      <h1>Welcome back, <em id="firstName">—</em></h1>
      <p>Designer portal</p>
    </div>
    <div class="top-date" id="topDate"></div>
  </div>
  <div class="section-header" style="margin-bottom:1.2rem;">
    <span class="section-label">My Active Projects</span>
  </div>
  <div class="projects-list" id="myProjects">
    <div class="empty"><p>Loading...</p></div>
  </div>
  <div class="section-header" style="margin-bottom:1.2rem;">
    <span class="section-label">Available Projects</span>
  </div>
  <div class="available-grid" id="availableProjects">
    <div class="empty"><p>Loading...</p></div>
  </div>
</main>
<script>
  async function logout(e) { e.preventDefault(); await fetch('/logout', { method: 'POST' }); window.location.href = '/'; }
  const now = new Date();
  document.getElementById('topDate').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  fetch('/api/me').then(r => r.json()).then(data => {
    if (!data.loggedIn) return window.location.href = '/login';
    document.getElementById('nameDisplay').textContent = data.fullName.split(' ')[0];
    document.getElementById('firstName').textContent = data.fullName.split(' ')[0];
  });
  async function loadMyProjects() {
    const res = await fetch('/api/my-projects');
    const projects = await res.json();
    const list = document.getElementById('myProjects');
    if (!projects.length) {
      list.innerHTML = '<div class="empty"><h3>No active projects</h3><p>Claim a project below to get started.</p></div>';
      return;
    }
    list.innerHTML = projects.map(p => `
      <div class="project-row" onclick="window.location.href='/project/${p.id}'">
        <div class="project-img">${p.preview_image ? `<img src="${p.preview_image}">` : ''}</div>
        <div class="project-info">
          <h3>${p.room_type}</h3>
          <p>${p.customer_name || 'Customer'} · ${p.status.replace('_', ' ')}</p>
        </div>
        <div class="status-dot dot-${p.status}"></div>
        <span class="status-text">${p.status.replace('_', ' ')}</span>
        <span class="project-arrow">→</span>
      </div>`).join('');
  }
  async function loadAvailableProjects() {
    const res = await fetch('/api/available-projects');
    const projects = await res.json();
    const grid = document.getElementById('availableProjects');
    if (!projects.length) {
      grid.innerHTML = '<div class="empty"><h3>No available projects</h3><p>Check back soon for new opportunities.</p></div>';
      return;
    }
    grid.innerHTML = projects.map(p => `
      <div class="available-card">
        <h3>${p.room_type}</h3>
        <div class="card-meta">
          <span>${p.customer_name || 'Customer'}</span>
          ${p.budget ? '<span>$' + p.budget + ' budget</span>' : ''}
        </div>
        <p>${p.feeling || p.style_preferences || 'No description provided.'}</p>
        <button class="claim-btn" onclick="claimProject(${p.id}, this)">Claim Project</button>
      </div>`).join('');
  }
  async function claimProject(id, btn) {
    btn.disabled = true; btn.textContent = 'Claiming...';
    const res = await fetch('/api/projects/' + id + '/claim', { method: 'POST' });
    const data = await res.json();
    if (data.success) { loadMyProjects(); loadAvailableProjects(); }
    else { btn.disabled = false; btn.textContent = 'Claim Project'; alert(data.error); }
  }
  loadMyProjects();
  loadAvailableProjects();
</script>
</body>
</html>
