<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Designers — Olive Designs</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .designer-card { background: var(--white); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; transition: all 0.2s; cursor: pointer; }
    .designer-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--shadow-md); }
    .designer-card-img { height: 180px; background: linear-gradient(135deg, #c8d4ac, #8a9e5f); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    .designer-card-body { padding: 20px; }
    .stars { color: #c9a84c; letter-spacing: 2px; }
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="brand-wrap">
      <a href="/" class="brand" style="font-size:1.3rem;text-decoration:none;">Olive Designs</a>
    </div>
    <ul class="sidebar-nav" id="sidebarNav"></ul>
    <div class="sidebar-bottom">
      <ul class="sidebar-nav" style="padding:0;">
        <li><a href="#"><span class="nav-icon">😊</span> <span id="nameDisplay">Account</span></a></li>
        <li><a href="#" onclick="logout(event)"><span class="nav-icon">→</span> Sign Out</a></li>
      </ul>
    </div>
  </aside>
  <main class="dashboard-main">
    <div class="page-header">
      <h1>Browse Designers</h1>
      <p>Find the perfect designer for your space</p>
    </div>
    <div id="designersGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;"></div>
  </main>
</div>
<script>
  async function logout(e) { e.preventDefault(); await fetch('/logout', { method: 'POST' }); window.location.href = '/'; }

  function stars(rating) {
    const full = Math.round(rating || 0);
    return '★'.repeat(full) + '☆'.repeat(5 - full);
  }

  async function init() {
    const meRes = await fetch('/api/me');
    const me = await meRes.json();
    if (!me.loggedIn) return window.location.href = '/login';
    document.getElementById('nameDisplay').textContent = me.fullName.split(' ')[0];

    const nav = document.getElementById('sidebarNav');
    if (me.role === 'customer') {
      nav.innerHTML = `
        <li><a href="/dashboard/customer"><span class="nav-icon">🏠</span> My Projects</a></li>
        <li><a href="/project/new"><span class="nav-icon">✨</span> New Project</a></li>
        <li><a href="/designers" class="active"><span class="nav-icon">👤</span> Browse Designers</a></li>`;
    } else {
      nav.innerHTML = `<li><a href="/dashboard/designer"><span class="nav-icon">✨</span> Dashboard</a></li>`;
    }

    const res = await fetch('/api/designers');
    const designers = await res.json();
    const grid = document.getElementById('designersGrid');

    if (!designers.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 40px;"><div style="font-size:3rem;margin-bottom:16px;">🎨</div><h3>No designers yet</h3></div>`;
      return;
    }

    grid.innerHTML = designers.map(d => `
      <div class="designer-card">
        <div class="designer-card-img">${d.avatar_path ? `<img src="${d.avatar_path}" style="width:100%;height:100%;object-fit:cover;">` : '🎨'}</div>
        <div class="designer-card-body">
          <h3 style="font-size:1.1rem;margin-bottom:4px;">${d.full_name}</h3>
          <div style="font-size:0.82rem;color:var(--rose);font-weight:500;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:8px;">${d.style_specialties || 'Interior Designer'}</div>
          <div class="stars">${stars(d.rating)}</div>
          <div style="font-size:0.8rem;color:var(--muted);margin-top:4px;">${d.completed_projects || 0} projects completed</div>
          ${d.bio ? `<p style="font-size:0.85rem;color:var(--muted);margin-top:10px;line-height:1.5;">${d.bio}</p>` : ''}
        </div>
      </div>
    `).join('');
  }

  init();
</script>
</body>
</html>
