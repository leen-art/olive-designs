<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Designers — Olive</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #FAF7F4; color: #2A2520; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.4rem 4rem; display: flex; align-items: center; justify-content: space-between; background: rgba(250,247,244,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid #EDE8E0; }
    .brand { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 300; color: #2A2520; text-decoration: none; letter-spacing: 0.1em; }
    .brand em { color: #C4A882; font-style: italic; }
    .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.78rem; color: #7A7168; text-decoration: none; letter-spacing: 0.06em; }
    .nav-links a:hover { color: #2A2520; }
    .nav-cta { background: #2A2520; color: white !important; padding: 0.6rem 1.4rem; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; }
    .nav-cta:hover { background: #C4A882 !important; color: #2A2520 !important; }
    .page-hero { padding: 8rem 6rem 4rem; border-bottom: 1px solid #EDE8E0; }
    .page-hero-eyebrow { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.18em; color: #C4A882; font-weight: 500; display: block; margin-bottom: 1rem; }
    .page-hero h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 300; color: #2A2520; line-height: 1.1; }
    .page-hero h1 em { font-style: italic; color: #C4A882; }
    .page-hero p { font-size: 0.85rem; color: #A89880; margin-top: 1rem; font-weight: 300; line-height: 1.8; max-width: 500px; }
    .designers-section { padding: 4rem 6rem; }
    .designers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: #EDE8E0; }
    .designer-card { background: #FAF7F4; padding: 2.5rem; cursor: pointer; transition: background 0.15s; }
    .designer-card:hover { background: white; }
    .designer-avatar { width: 64px; height: 64px; border-radius: 50%; background: #EDE8E0; margin-bottom: 1.5rem; overflow: hidden; }
    .designer-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .designer-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 0.3rem; color: #2A2520; }
    .designer-specialty { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #C4A882; margin-bottom: 0.8rem; font-weight: 500; }
    .designer-bio { font-size: 0.78rem; color: #A89880; line-height: 1.7; font-weight: 300; margin-bottom: 1.2rem; }
    .designer-stats { font-size: 0.7rem; color: #A89880; display: flex; gap: 1.5rem; padding-top: 1rem; border-top: 1px solid #EDE8E0; }
    .stat span { display: block; font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: #2A2520; font-weight: 300; }
    .empty { padding: 6rem; text-align: center; background: #FAF7F4; }
    .empty h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; margin-bottom: 0.5rem; }
    .empty p { font-size: 0.8rem; color: #A89880; font-weight: 300; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="brand">Olive<em>.</em></a>
  <ul class="nav-links">
    <li><a href="/dashboard/customer">Dashboard</a></li>
    <li><a href="/ai-flip">AI Flip Preview</a></li>
    <li><a href="/signup" class="nav-cta">Get Started</a></li>
  </ul>
</nav>
<div class="page-hero">
  <span class="page-hero-eyebrow">Our Designers</span>
  <h1>Meet the <em>talent</em></h1>
  <p>Every designer on Olive is vetted for quality, creativity, and client communication. Browse profiles and find your perfect match.</p>
</div>
<div class="designers-section">
  <div class="designers-grid" id="designersGrid">
    <div class="empty"><p>Loading designers...</p></div>
  </div>
</div>
<script>
  async function loadDesigners() {
    const res = await fetch('/api/designers');
    const designers = await res.json();
    const grid = document.getElementById('designersGrid');
    if (!designers.length) {
      grid.innerHTML = '<div class="empty"><h3>No designers yet</h3><p>Check back soon.</p></div>';
      return;
    }
    grid.innerHTML = designers.map((d, i) => `
      <div class="designer-card">
        
        <h3>${d.full_name}</h3>
        <div class="designer-specialty">${d.style_specialties || 'Interior Design'}</div>
        <p class="designer-bio">${d.bio || 'Passionate about creating beautiful, functional spaces.'}</p>
        <div class="designer-stats">
          <div class="stat"><span>${d.completed_projects || 0}</span>Projects</div>
          <div class="stat"><span>${d.years_experience || 0}</span>Years Exp.</div>
          <div class="stat"><span>${d.rating ? Number(d.rating).toFixed(1) : '—'}</span>Rating</div>
        </div>
      </div>`).join('');
  }
  loadDesigners();
</script>
</body>
</html>
