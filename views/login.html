<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Olive Designs</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-visual">
    <div class="auth-visual-content">
      <span class="brand-large">Olive Designs</span>
      <p>Beautiful interiors, crafted by designers who care. Welcome back.</p>
    </div>
  </div>
  <div class="auth-form-side">
    <h1>Welcome back</h1>
    <p class="subtitle">Don't have an account? <a href="/signup">Sign up free</a></p>
    <div class="alert alert-error" id="errorAlert"></div>
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;" id="submitBtn">Sign In</button>
    </form>
  </div>
</div>
<script>
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errorAlert = document.getElementById('errorAlert');
    errorAlert.classList.remove('show');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) {
      errorAlert.textContent = 'Please enter your email and password.';
      errorAlert.classList.add('show');
      return;
    }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';
    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) {
        errorAlert.textContent = data.error || 'Invalid credentials.';
        errorAlert.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }
      window.location.href = data.role === 'designer' ? '/dashboard/designer' : '/dashboard/customer';
    } catch (err) {
      errorAlert.textContent = 'Network error. Please try again.';
      errorAlert.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
