<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — Olive Designs</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 28px; }
    .tab { padding: 10px 20px; cursor: pointer; font-size: 0.9rem; font-weight: 500; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab.active { color: var(--olive); border-bottom-color: var(--olive); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .status-track { display: flex; align-items: center; gap: 0; margin-bottom: 32px; }
    .status-step { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
    .status-step-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--muted); font-weight: 600; }
    .status-step-dot.done { background: var(--olive); color: white; }
    .status-step-dot.active { background: var(--pink); color: var(--text); }
    .status-step-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); text-align: center; }
    .status-line { flex: 1; height: 2px; background: var(--border); margin-bottom: 24px; }
    .status-line.done { background: var(--olive); }
    .messages-wrap { height: 400px; overflow-y: auto; border: 1px solid var(--border); border-radius: 12px; padding: 16px; background: var(--white); margin-bottom: 12px; }
    .msg-row { display: flex; flex-direction: column; margin-bottom: 12px; }
    .msg-row.mine { align-items: flex-end; }
    .msg-row.theirs { align-items: flex-start; }
    .msg-bubble { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; }
    .msg-bubble.mine { background: var(--olive); color: white; border-bottom-right-radius: 4px; }
    .msg-bubble.theirs { background: #f0f0f0; color: var(--text); border-bottom-left-radius: 4px; }
    .msg-meta { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
    .furniture-row { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--white); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 8px; }
    .furniture-row .item-name { font-weight: 500; flex: 1; }
    .furniture-row .item-price { color: var(--olive); font-weight: 600; white-space: nowrap; }
    .furniture-row .item-store { color: var(--muted); font-size: 0.85rem; }
    .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .image-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="brand-wrap">
      <a href="/" class="brand" style="font-size:1.3rem;text-decoration:none;">Olive Designs</a>
    </div>
    <ul class="sidebar-nav" id="sidebarNav"></ul>
    <div class="sidebar-bottom">
      <ul class="sidebar-nav" style="padding:0;">
        <li><a href="#"><span class="nav-icon">😊</span> <span id="nameDisplay">Account</span></a></li>
        <li><a href="#" onclick="logout(event)"><span class="nav-icon">→</span> Sign Out</a></li>
      </ul>
    </div>
  </aside>
  <main class="dashboard-main">
    <div id="content" style="max-width:800px;">
      <div style="text-align:center;padding:60px;"><div style="font-size:2rem;">⏳</div><p style="color:var(--muted);margin-top:12px;">Loading project...</p></div>
    </div>
  </main>
</div>
<script>
  const projectId = window.location.pathname.split('/').pop();
  let me = null;
  let projectData = null;

  async function logout(e) { e.preventDefault(); await fetch('/logout', { method: 'POST' }); window.location.href = '/'; }

  async function init() {
    const meRes = await fetch('/api/me');
    me = await meRes.json();
    if (!me.loggedIn) return window.location.href = '/login';
    document.getElementById('nameDisplay').textContent = me.fullName.split(' ')[0];

    const nav = document.getElementById('sidebarNav');
    if (me.role === 'customer') {
      nav.innerHTML = `
        <li><a href="/dashboard/customer"><span class="nav-icon">🏠</span> My Projects</a></li>
        <li><a href="/project/new"><span class="nav-icon">✨</span> New Project</a></li>
        <li><a href="/designers"><span class="nav-icon">👤</span> Browse Designers</a></li>`;
    } else {
      nav.innerHTML = `
        <li><a href="/dashboard/designer"><span class="nav-icon">✨</span> Available Projects</a></li>
        <li><a href="/dashboard/designer"><span class="nav-icon">📋</span> My Active Projects</a></li>`;
    }

    const res = await fetch('/api/projects/' + projectId);
    if (!res.ok) { document.getElementById('content').innerHTML = '<p style="color:var(--muted)">Project not found.</p>'; return; }
    projectData = await res.json();
    render();
  }

  function render() {
    const { project, images, furniture, messages } = projectData;
    const statuses = ['submitted', 'assigned', 'in_progress', 'review', 'completed'];
    const statusLabels = ['Submitted', 'Assigned', 'In Progress', 'Review', 'Completed'];
    const currentIdx = statuses.indexOf(project.status);
    const roomImages = images.filter(i => i.image_type === 'room');
    const inspirationImages = images.filter(i => i.image_type === 'inspiration');
    const totalFurniture = furniture.reduce((sum, item) => sum + (item.price || 0), 0);
    const isDesignerWorking = me.role === 'designer' && (project.status === 'assigned' || project.status === 'in_progress');

    document.getElementById('content').innerHTML = `
      <div style="margin-bottom:8px;">
        <a href="${me.role === 'customer' ? '/dashboard/customer' : '/dashboard/designer'}" style="color:var(--muted);text-decoration:none;font-size:0.85rem;">← Back</a>
      </div>
      <div class="page-header">
        <h1>${project.room_type}</h1>
        <p>${project.customer_name ? 'Customer: ' + project.customer_name : ''} ${project.designer_name ? '· Designer: ' + project.designer_name : '· Awaiting designer'}</p>
      </div>

      <div class="status-track">
        ${statuses.map((s, i) => `
          ${i > 0 ? `<div class="status-line ${i <= currentIdx ? 'done' : ''}"></div>` : ''}
          <div class="status-step">
            <div class="status-step-dot ${i < currentIdx ? 'done' : i === currentIdx ? 'active' : ''}">${i < currentIdx ? '✓' : i + 1}</div>
            <div class="status-step-label">${statusLabels[i]}</div>
          </div>
        `).join('')}
      </div>

      <div class="tabs">
        <div class="tab active" data-tab="details" onclick="switchTab(this)">Details</div>
        <div class="tab" data-tab="deliverables" onclick="switchTab(this)">Deliverables</div>
        <div class="tab" data-tab="messages" onclick="switchTab(this)">Messages</div>
        ${isDesignerWorking ? '<div class="tab" data-tab="workspace" onclick="switchTab(this)">Workspace</div>' : ''}
      </div>

      <div class="tab-content active" id="tab-details">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
          <div style="background:var(--white);padding:16px;border-radius:12px;border:1px solid var(--border);">
            <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:4px;">Budget</div>
            <div style="font-size:1.1rem;font-weight:600;">${project.budget ? '$' + project.budget : '—'}</div>
          </div>
          <div style="background:var(--white);padding:16px;border-radius:12px;border:1px solid var(--border);">
            <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:4px;">Dimensions</div>
            <div style="font-size:1.1rem;font-weight:600;">${project.dimensions || '—'}</div>
          </div>
        </div>
        ${project.style_preferences ? `<div style="margin-bottom:16px;"><div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;">Style Preferences</div><div>${project.style_preferences}</div></div>` : ''}
        ${project.feeling ? `<div style="margin-bottom:16px;"><div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;">Feeling</div><div>${project.feeling}</div></div>` : ''}
        ${project.color_preferences ? `<div style="margin-bottom:16px;"><div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;">Color Preferences</div><div>${project.color_preferences}</div></div>` : ''}
        ${project.items_to_keep ? `<div style="margin-bottom:16px;"><div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;">Items to Keep</div><div>${project.items_to_keep}</div></div>` : ''}
        ${project.items_wanted ? `<div style="margin-bottom:16px;"><div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;">Items Wanted</div><div>${project.items_wanted}</div></div>` : ''}
        ${roomImages.length ? `<div style="margin-bottom:16px;"><div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;">Room Photos</div><div class="image-grid">${roomImages.map(i => `<img src="${i.image_path}">`).join('')}</div></div>` : ''}
        ${inspirationImages.length ? `<div style="margin-bottom:16px;"><div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;">Inspiration</div><div class="image-grid">${inspirationImages.map(i => `<img src="${i.image_path}">`).join('')}</div></div>` : ''}
      </div>

      <div class="tab-content" id="tab-deliverables">
        ${project.concept_image_path ? `<img src="${project.concept_image_path}" style="width:100%;border-radius:12px;margin-bottom:20px;border:1px solid var(--border);">` : '<p style="color:var(--muted);margin-bottom:20px;">No concept image yet.</p>'}
        ${project.concept_description ? `<div style="background:var(--white);padding:20px;border-radius:12px;border:1px solid var(--border);margin-bottom:20px;"><div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;">Designer Notes</div><p>${project.concept_description}</p></div>` : ''}
        ${furniture.length ? `
          <div style="margin-bottom:16px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
              <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);">Furniture List</div>
              <div style="font-size:0.85rem;color:var(--olive);font-weight:600;">Total: $${totalFurniture.toLocaleString()}</div>
            </div>
            ${furniture.map(item => `
              <div class="furniture-row">
                <div style="flex:1;">
                  <div class="item-name">${item.item_name}</div>
                  <div class="item-store">${item.store_name || ''} ${item.category ? '· ' + item.category : ''}</div>
                  ${item.note ? `<div style="font-size:0.8rem;color:var(--muted);margin-top:2px;">${item.note}</div>` : ''}
                </div>
                <div class="item-price">${item.price ? '$' + item.price : ''}</div>
                ${item.product_url ? `<a href="${item.product_url}" target="_blank" class="btn btn-primary" style="padding:8px 14px;font-size:0.78rem;">Shop</a>` : ''}
              </div>
            `).join('')}
          </div>
        ` : '<p style="color:var(--muted);">No furniture items yet.</p>'}
        ${me.role === 'customer' && project.status === 'review' ? `
          <div style="display:flex;gap:12px;margin-top:24px;">
            <button onclick="approveDesign()" class="btn btn-olive" style="flex:1;">✓ Approve Design</button>
            ${!project.revision_used ? `<button onclick="showRevisionForm()" class="btn btn-secondary" style="flex:1;">Request Revision</button>` : ''}
          </div>
          <div id="revisionForm" style="display:none;margin-top:16px;">
            <textarea id="revisionFeedback" rows="3" placeholder="What would you like changed?" style="width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'Jost',sans-serif;outline:none;"></textarea>
            <button onclick="submitRevision()" class="btn btn-primary" style="margin-top:8px;">Submit Feedback</button>
          </div>
        ` : ''}
        ${me.role === 'customer' && project.status === 'completed' ? `
          <div style="margin-top:24px;background:var(--white);padding:20px;border-radius:12px;border:1px solid var(--border);">
            <h3 style="font-size:1rem;margin-bottom:12px;">Leave a Review</h3>
            <div style="display:flex;gap:8px;margin-bottom:12px;">
              ${[1,2,3,4,5].map(n => `<span onclick="setRating(${n})" style="font-size:1.8rem;cursor:pointer;opacity:0.4;" id="star-${n}">★</span>`).join('')}
            </div>
            <textarea id="reviewText" rows="2" placeholder="Share your experience..." style="width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'Jost',sans-serif;outline:none;margin-bottom:8px;"></textarea>
            <button onclick="submitReview()" class="btn btn-primary">Submit Review</button>
          </div>
        ` : ''}
      </div>

      <div class="tab-content" id="tab-messages">
        <div class="messages-wrap" id="messagesList"></div>
        <div style="display:flex;gap:10px;">
          <input type="text" id="msgInput" placeholder="Type a message..." style="flex:1;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'Jost',sans-serif;outline:none;" onkeydown="if(event.key==='Enter')sendMessage()">
          <button onclick="sendMessage()" class="btn btn-olive">Send</button>
        </div>
      </div>

      ${isDesignerWorking ? `
      <div class="tab-content" id="tab-workspace">
        <h3 style="font-size:1rem;margin-bottom:16px;">Build Furniture List</h3>
        <div id="furnitureWorkspaceList" style="margin-bottom:16px;"></div>
        <div style="background:var(--white);padding:20px;border-radius:12px;border:1px solid var(--border);margin-bottom:24px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
            <input type="text" id="fi-name" placeholder="Item name *" style="padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Jost',sans-serif;outline:none;">
            <input type="text" id="fi-category" placeholder="Category (e.g. Sofa)" style="padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Jost',sans-serif;outline:none;">
            <input type="text" id="fi-store" placeholder="Store name" style="padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Jost',sans-serif;outline:none;">
            <input type="number" id="fi-price" placeholder="Price" style="padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Jost',sans-serif;outline:none;">
            <input type="text" id="fi-url" placeholder="Product URL" style="padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Jost',sans-serif;outline:none;grid-column:1/-1;">
            <input type="text" id="fi-note" placeholder="Note (why you chose it)" style="padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Jost',sans-serif;outline:none;grid-column:1/-1;">
          </div>
          <button onclick="addFurniture()" class="btn btn-olive" style="width:100%;">+ Add Item</button>
        </div>
        <h3 style="font-size:1rem;margin-bottom:16px;">Submit Design</h3>
        <div style="background:var(--white);padding:20px;border-radius:12px;border:1px solid var(--border);">
          <div class="form-group">
            <label>Concept Image</label>
            <input type="file" id="conceptImage" accept="image/*" style="padding:10px;border:1.5px solid var(--border);border-radius:8px;width:100%;">
          </div>
          <div class="form-group">
            <label>Design Notes</label>
            <textarea id="conceptDesc" rows="4" placeholder="Describe your design concept..." style="width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'Jost',sans-serif;outline:none;"></textarea>
          </div>
          <button onclick="submitDesign()" class="btn btn-primary" style="width:100%;">Submit Design to Customer ✨</button>
        </div>
      </div>
      ` : ''}
    `;

    renderMessages(messages);
    if (document.getElementById('furnitureWorkspaceList')) renderFurnitureWorkspace(furniture);
  }

  function renderMessages(messages) {
    const list = document.getElementById('messagesList');
    if (!list) return;
    if (!messages.length) {
      list.innerHTML = '<p style="color:var(--muted);font-size:0.9rem;">No messages yet. Start the conversation!</p>';
      return;
    }
    list.innerHTML = messages.map(m => {
      const isMine = String(m.sender_id) === String(me.userId);
      return `
        <div class="msg-row ${isMine ? 'mine' : 'theirs'}">
          <div class="msg-meta">${m.sender_name}</div>
          <div class="msg-bubble ${isMine ? 'mine' : 'theirs'}">${m.content}</div>
        </div>
      `;
    }).join('');
    list.scrollTop = list.scrollHeight;
  }

  function renderFurnitureWorkspace(furniture) {
    const list = document.getElementById('furnitureWorkspaceList');
    if (!list) return;
    if (!furniture.length) {
      list.innerHTML = '<p style="color:var(--muted);font-size:0.9rem;margin-bottom:12px;">No items added yet.</p>';
      return;
    }
    const total = furniture.reduce((s, i) => s + (i.price || 0), 0);
    list.innerHTML = furniture.map(item => `
      <div class="furniture-row">
        <div style="flex:1;">
          <div class="item-name">${item.item_name}</div>
          <div class="item-store">${item.store_name || ''}</div>
        </div>
        <div class="item-price">${item.price ? '$' + item.price : ''}</div>
        <button onclick="deleteFurniture(${item.id})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;">✕</button>
      </div>
    `).join('') + `<div style="text-align:right;color:var(--olive);font-weight:600;margin-top:8px;">Total: $${total.toLocaleString()} / $${projectData.project.budget || '?'}</div>`;
  }

  function switchTab(el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + el.dataset.tab).classList.add('active');
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const content = input.value.trim();
    if (!content) return;
    input.value = '';
    const res = await fetch('/api/projects/' + projectId + '/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    const data = await res.json();
    if (data.success) {
      projectData.messages.push(data.message);
      renderMessages(projectData.messages);
    }
  }

  async function addFurniture() {
    const item_name = document.getElementById('fi-name').value.trim();
    if (!item_name) return alert('Item name is required.');
    const body = {
      item_name,
      category: document.getElementById('fi-category').value,
      store_name: document.getElementById('fi-store').value,
      price: document.getElementById('fi-price').value,
      product_url: document.getElementById('fi-url').value,
      note: document.getElementById('fi-note').value
    };
    const res = await fetch('/api/projects/' + projectId + '/furniture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) {
      ['fi-name','fi-category','fi-store','fi-price','fi-url','fi-note'].forEach(id => document.getElementById(id).value = '');
      const refreshed = await fetch('/api/projects/' + projectId);
      projectData = await refreshed.json();
      renderFurnitureWorkspace(projectData.furniture);
    }
  }

  async function deleteFurniture(id) {
    await fetch('/api/furniture/' + id, { method: 'DELETE' });
    const refreshed = await fetch('/api/projects/' + projectId);
    projectData = await refreshed.json();
    renderFurnitureWorkspace(projectData.furniture);
  }

  async function submitDesign() {
    const formData = new FormData();
    formData.append('concept_description', document.getElementById('conceptDesc').value);
    const file = document.getElementById('conceptImage').files[0];
    if (file) formData.append('concept_image', file);
    const res = await fetch('/api/projects/' + projectId + '/submit', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.success) { alert('Design submitted!'); window.location.reload(); }
    else alert(data.error || 'Error submitting design.');
  }

  async function approveDesign() {
    const res = await fetch('/api/projects/' + projectId + '/approve', { method: 'POST' });
    const data = await res.json();
    if (data.success) { alert('Design approved!'); window.location.reload(); }
    else alert(data.error || 'Error approving design.');
  }

  function showRevisionForm() {
    document.getElementById('revisionForm').style.display = 'block';
  }

  async function submitRevision() {
    const feedback = document.getElementById('revisionFeedback').value;
    const res = await fetch('/api/projects/' + projectId + '/revision', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ feedback })
    });
    const data = await res.json();
    if (data.success) { alert('Revision requested!'); window.location.reload(); }
    else alert(data.error || 'Error requesting revision.');
  }

  let selectedRating = 0;
  function setRating(n) {
    selectedRating = n;
    for (let i = 1; i <= 5; i++) {
      document.getElementById('star-' + i).style.opacity = i <= n ? '1' : '0.4';
    }
  }

  async function submitReview() {
    if (!selectedRating) return alert('Please select a rating.');
    const review_text = document.getElementById('reviewText').value;
    const res = await fetch('/api/projects/' + projectId + '/review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rating: selectedRating, review_text })
    });
    const data = await res.json();
    if (data.success) alert('Review submitted! Thank you.');
    else alert(data.error || 'Error submitting review.');
  }

  init();
setInterval(async () => {
  if (!projectData) return;
  const res = await fetch('/api/projects/' + projectId);
  if (!res.ok) return;
  const fresh = await res.json();
  if (fresh.messages.length !== projectData.messages.length) {
    projectData.messages = fresh.messages;
    renderMessages(fresh.messages);
  }
}, 3000);
</script>
</body>
</html>
